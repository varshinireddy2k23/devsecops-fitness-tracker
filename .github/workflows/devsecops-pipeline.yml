name: Enterprise Dynamic DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

env:
  IMAGE_NAME: fitness-tracker
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: fitness-tracker-cluster
  DOCKER_USER: varshinireddy19

jobs:
  dynamic-devsecops-pipeline:
    runs-on: ubuntu-latest

    steps:

    ########################################################
    # Checkout
    ########################################################
    - name: Checkout Repository
      uses: actions/checkout@v4

    ########################################################
    # Detect App Type
    ########################################################
    - name: Detect Application Type
      run: |
        if [ -f "package.json" ]; then
          echo "APP_TYPE=nodejs" >> $GITHUB_ENV
        fi

    ########################################################
    # Setup Node
    ########################################################
    - name: Setup Node.js
      if: env.APP_TYPE == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: 18

    ########################################################
    # Install Dependencies
    ########################################################
    - name: Install Dependencies
      if: env.APP_TYPE == 'nodejs'
      run: npm install

    ########################################################
    # Reports folder
    ########################################################
    - name: Create Reports Directory
      run: mkdir -p reports

    ########################################################
    # GITLEAKS
    ########################################################
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    ########################################################
    # SEMGREP
    ########################################################
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true

    ########################################################
    # DEPENDENCY SCAN
    ########################################################
    - name: Dependency Scan
      run: |
        npm audit --json > reports/dependency.json || true

    ########################################################
    # DOCKER LOGIN
    ########################################################
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    ########################################################
    # BUILD IMAGE
    ########################################################
    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME .

    ########################################################
    # TAG IMAGE
    ########################################################
    - name: Tag Docker Image
      run: docker tag $IMAGE_NAME $DOCKER_USER/$IMAGE_NAME:latest

    ########################################################
    # PUSH IMAGE (IMPORTANT: BEFORE SCAN)
    ########################################################
    - name: Push Docker Image
      run: docker push $DOCKER_USER/$IMAGE_NAME:latest

    ########################################################
    # TRIVY SCAN
    ########################################################
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest'
        format: json
        output: reports/trivy.json
      continue-on-error: true

    ########################################################
    # OPA POLICY GATE (NEW FIX)
    ########################################################
    - name: Install OPA
      run: |
        curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
        chmod +x opa
        sudo mv opa /usr/local/bin/

    - name: Run OPA Policy Check
      run: |
        opa eval --format pretty \
          --data security/policy.rego \
          --input reports/trivy.json \
          "data.devsecops.deny"

    ########################################################
    # CHECKOV (IaC)
    ########################################################
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      continue-on-error: true
      with:
        directory: .
        framework: kubernetes
        output_format: json
        output_file_path: reports/checkov.json

    ########################################################
    # PYTHON REPORT GENERATION
    ########################################################
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install Python Dependencies
      run: pip install pandas openpyxl

    - name: Generate Report
      run: python scripts/report-generator.py
      continue-on-error: true

    ########################################################
    # ARTIFACT UPLOAD
    ########################################################
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/

    ########################################################
    # AWS CONFIG
    ########################################################
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################################
    # KUBECTL
    ########################################################
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER_NAME

    ########################################################
    # NAMESPACE
    ########################################################
    - name: Create Namespaces
      run: |
        kubectl create ns dev --dry-run=client -o yaml | kubectl apply -f -
        kubectl create ns staging --dry-run=client -o yaml | kubectl apply -f -
        kubectl create ns prod --dry-run=client -o yaml | kubectl apply -f -

    ########################################################
    # DEPLOYMENTS
    ########################################################
    - name: Deploy to Dev
      run: kubectl apply -f k8s/ -n dev

    - name: Deploy to Staging
      run: kubectl apply -f k8s/ -n staging

    - name: Deploy to Prod
      run: kubectl apply -f k8s/ -n prod

    ########################################################
    # VERIFY
    ########################################################
    - name: Verify Deployment
      run: |
        kubectl get pods -A
        kubectl get svc -A