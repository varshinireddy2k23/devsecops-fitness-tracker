name: Enterprise Dynamic DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

env:
  IMAGE_NAME: fitness-tracker
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: fitness-tracker-cluster

jobs:
  dynamic-devsecops-pipeline:

    runs-on: ubuntu-latest

    steps:

    ########################################################
    # Checkout Repository
    ########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ########################################################
    # Detect Application Type Dynamically
    ########################################################

    - name: Detect Application Type
      run: |

        echo "Detecting application type..."

        if [ -f "package.json" ]; then
          echo "APP_TYPE=nodejs" >> $GITHUB_ENV
          echo "Node.js application detected"
        fi

        if [ -f "requirements.txt" ]; then
          echo "APP_TYPE=python" >> $GITHUB_ENV
          echo "Python application detected"
        fi

        if [ -f "pom.xml" ]; then
          echo "APP_TYPE=java" >> $GITHUB_ENV
          echo "Java application detected"
        fi

        if [ -f "Dockerfile" ]; then
          echo "Docker application detected"
        fi

    ########################################################
    # Setup Node.js
    ########################################################

    - name: Setup Node.js
      if: env.APP_TYPE == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: 18

    ########################################################
    # Install Dependencies
    ########################################################

    - name: Install Dependencies
      if: env.APP_TYPE == 'nodejs'
      run: npm install

    ########################################################
    # Create Reports Directory
    ########################################################

    - name: Create Reports Directory
      run: mkdir -p reports

    ########################################################
    # SECRET SCAN — GITLEAKS
    ########################################################

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    ########################################################
    # SAST SCAN — SEMGREP
    ########################################################

    - name: Run Semgrep SAST
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true

    ########################################################
    # DEPENDENCY SCAN
    ########################################################

    - name: Run Dependency Scan
      run: |
        npm audit --json > reports/dependency-report.json
      continue-on-error: true

    ########################################################
    # DOCKER HUB LOGIN
    ########################################################

    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    ########################################################
    # BUILD DOCKER IMAGE
    ########################################################

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME .

    ########################################################
    # TAG DOCKER IMAGE
    ########################################################

    - name: Tag Docker Image
      run: |
        docker tag $IMAGE_NAME varshinireddy19/$IMAGE_NAME:latest

    ########################################################
    # CONTAINER SCAN — TRIVY
    ########################################################

    - name: Run Trivy Container Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'varshinireddy19/fitness-tracker:latest'
        format: 'json'
        output: 'reports/trivy-report.json'
      continue-on-error: true

    ########################################################
    # IaC SCAN — CHECKOV
    ########################################################

    - name: Run Checkov IaC Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: kubernetes
        output_format: json
        output_file_path: reports/checkov-report.json
      continue-on-error: true

    ########################################################
    # Setup Python
    ########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    ########################################################
    # Install Python Packages
    ########################################################

    - name: Install Python Packages
      run: |
        pip install pandas openpyxl

    ########################################################
    # Generate Excel Report
    ########################################################

    - name: Generate Excel Security Report
      run: |
        python scripts/report-generator.py
      continue-on-error: true

    ########################################################
    # Upload Artifacts
    ########################################################

    - name: Upload Reports Artifact
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/

    ########################################################
    # POLICY GATE
    ########################################################

    - name: Check for Critical Vulnerabilities
      run: |

        echo "Checking for CRITICAL vulnerabilities..."

        if [ -f reports/trivy-report.json ]; then

          if grep -q "CRITICAL" reports/trivy-report.json; then
            echo "CRITICAL vulnerabilities detected"
            exit 1
          else
            echo "No CRITICAL vulnerabilities found"
          fi

        else
          echo "Trivy report not found"
        fi

    ########################################################
    # PUSH DOCKER IMAGE
    ########################################################

    - name: Push Docker Image
      run: |
        docker push varshinireddy19/$IMAGE_NAME:latest

    ########################################################
    # CONFIGURE AWS CREDENTIALS
    ########################################################

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################################
    # INSTALL KUBECTL
    ########################################################

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: latest

    ########################################################
    # UPDATE KUBECONFIG
    ########################################################

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER_NAME

    ########################################################
    # CREATE NAMESPACES
    ########################################################

    - name: Create Namespaces
      run: |
        kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
        kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

    ########################################################
    # DEPLOY TO DEV
    ########################################################

    - name: Deploy to Dev
      run: |
        kubectl apply -f k8s/ -n dev

    ########################################################
    # DEPLOY TO STAGING
    ########################################################

    - name: Deploy to Staging
      run: |
        kubectl apply -f k8s/ -n staging

    ########################################################
    # DEPLOY TO PROD
    ########################################################

    - name: Deploy to Prod
      run: |
        kubectl apply -f k8s/ -n prod

    ########################################################
    # VERIFY DEPLOYMENT
    ########################################################

    - name: Verify Kubernetes Deployment
      run: |
        kubectl get pods -A
        kubectl get svc -A
        kubectl get deployments -A

    ########################################################
    # SUCCESS MESSAGE
    ########################################################

    - name: Deployment Success
      run: |
        echo "Enterprise DevSecOps Pipeline Completed Successfully"