name: Enterprise Dynamic DevSecOps Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: fitness-tracker

jobs:
  dynamic-devsecops-pipeline:

    runs-on: ubuntu-latest

    steps:

    ########################################################
    # Checkout Code
    ########################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    ########################################################
    # Detect Application Type Dynamically
    ########################################################

    - name: Detect Application Type
      run: |

        echo "Detecting application type..."

        if [ -f "package.json" ]; then
          echo "APP_TYPE=nodejs" >> $GITHUB_ENV
          echo "Node.js application detected"
        fi

        if [ -f "requirements.txt" ]; then
          echo "APP_TYPE=python" >> $GITHUB_ENV
          echo "Python application detected"
        fi

        if [ -f "pom.xml" ]; then
          echo "APP_TYPE=java" >> $GITHUB_ENV
          echo "Java application detected"
        fi

        if [ -f "Dockerfile" ]; then
          echo "Docker application detected"
        fi

    ########################################################
    # Setup Node.js
    ########################################################

    - name: Setup Node.js
      if: env.APP_TYPE == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: 18

    ########################################################
    # Install Dependencies
    ########################################################

    - name: Install Dependencies
      if: env.APP_TYPE == 'nodejs'
      run: npm install

    ########################################################
    # Create Reports Directory
    ########################################################

    - name: Create Reports Directory
      run: mkdir -p reports

    ########################################################
    # SECRET SCAN — GITLEAKS
    ########################################################

    - name: Run Gitleaks Secret Scan
      id: gitleaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    ########################################################
    # SAST SCAN — SEMGREP
    ########################################################

    - name: Run Semgrep SAST
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true

    ########################################################
    # DEPENDENCY SCAN
    ########################################################

    - name: Run Dependency Scan
      run: |
        npm audit --json > reports/dependency-report.json
      continue-on-error: true

    ########################################################
    # BUILD DOCKER IMAGE
    ########################################################

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME .

    ########################################################
    # CONTAINER SCAN — TRIVY
    ########################################################

    - name: Run Trivy Container Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fitness-tracker'
        format: 'json'
        output: 'reports/trivy-report.json'
      continue-on-error: true

    ########################################################
    # IaC Scan — CHECKOV
    ########################################################

    - name: Run Checkov IaC Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: kubernetes
        output_format: json
        output_file_path: reports/checkov-report.json
      continue-on-error: true

    ########################################################
    # Install Python
    ########################################################

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    ########################################################
    # Install Excel Dependencies
    ########################################################

    - name: Install Python Packages
      run: |
        pip install pandas openpyxl

    ########################################################
    # Generate Excel Report
    ########################################################

    - name: Generate Excel Security Report
      run: |
        python scripts/report-generator.py

    ########################################################
    # Upload Artifacts
    ########################################################

    - name: Upload Reports Artifact
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/

    ########################################################
    # POLICY GATE
    ########################################################

    - name: Break Pipeline if Critical Vulnerabilities Found
      run: |

        echo "Checking for CRITICAL vulnerabilities..."

        if grep -q "CRITICAL" reports/trivy-report.json; then
          echo "Critical vulnerabilities detected"
          exit 1
        fi

    ########################################################
    # EMAIL NOTIFICATION
    ########################################################

    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "DevSecOps Pipeline Failed"
        body: "Critical vulnerabilities detected. Manual approval required."
        to: yourmail@gmail.com
        from: GitHub Actions

    ########################################################
    # MANUAL APPROVAL
    ########################################################

    - name: Manual Approval Required
      if: failure()
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ github.TOKEN }}
        approvers: varshinireddy2k23
        minimum-approvals: 1
        issue-title: "Critical Vulnerability Approval"
        issue-body: "Critical vulnerabilities detected. Approve deployment?"

    ########################################################
    # MOCK DEPLOYMENT
    ########################################################

    - name: Deploy Application
      run: |
        echo "Deployment successful"