name: Enterprise Dynamic DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

env:
  IMAGE_NAME: fitness-tracker
  DOCKER_IMAGE: varshinireddy19/fitness-tracker:latest
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: fitness-tracker-cluster

jobs:
  dynamic-devsecops-pipeline:
    runs-on: ubuntu-latest

    steps:

    ########################################################
    # Checkout Repository
    ########################################################
    - name: Checkout Repository
      uses: actions/checkout@v4

    ########################################################
    # Detect Application Type
    ########################################################
    - name: Detect Application Type
      run: |
        echo "Detecting application type..."

        if [ -f "package.json" ]; then
          echo "APP_TYPE=nodejs" >> $GITHUB_ENV
        elif [ -f "requirements.txt" ]; then
          echo "APP_TYPE=python" >> $GITHUB_ENV
        elif [ -f "pom.xml" ]; then
          echo "APP_TYPE=java" >> $GITHUB_ENV
        else
          echo "APP_TYPE=unknown" >> $GITHUB_ENV
        fi

    ########################################################
    # Setup Node.js
    ########################################################
    - name: Setup Node.js
      if: env.APP_TYPE == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      if: env.APP_TYPE == 'nodejs'
      run: npm install

    ########################################################
    # Security Reports Folder
    ########################################################
    - name: Create Reports Directory
      run: mkdir -p reports

    ########################################################
    # GITLEAKS
    ########################################################
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    ########################################################
    # SEMGREP
    ########################################################
    - name: Run Semgrep SAST
      uses: returntocorp/semgrep-action@v1
      continue-on-error: true

    ########################################################
    # Dependency Scan
    ########################################################
    - name: Run Dependency Scan
      if: env.APP_TYPE == 'nodejs'
      run: |
        npm audit --json > reports/dependency-report.json
      continue-on-error: true

    ########################################################
    # Docker Login
    ########################################################
    - name: DockerHub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    ########################################################
    # Build Docker Image
    ########################################################
    - name: Build Docker Image
      run: |
        docker build -t $DOCKER_IMAGE .

    ########################################################
    # Push Docker Image (IMPORTANT FIX)
    ########################################################
    - name: Push Docker Image
      run: |
        docker push $DOCKER_IMAGE

    ########################################################
    # Trivy Scan (after image exists)
    ########################################################
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.DOCKER_IMAGE }}
        format: json
        output: reports/trivy-report.json
      continue-on-error: true

    ########################################################
    # Checkov IaC Scan
    ########################################################
    - name: Run Checkov Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        framework: kubernetes
        output_format: json
        output_file_path: reports/checkov-report.json
      continue-on-error: true

    ########################################################
    # Python Report Generator
    ########################################################
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python Packages
      run: pip install pandas openpyxl

    - name: Generate Report
      run: python scripts/report-generator.py
      continue-on-error: true

    ########################################################
    # Upload Reports
    ########################################################
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/

    ########################################################
    # AWS CONFIG
    ########################################################
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################################
    # KUBECTL SETUP
    ########################################################
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: latest

    ########################################################
    # UPDATE KUBECONFIG (FIXED)
    ########################################################
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER_NAME

    ########################################################
    # DEPLOY TO EKS (FIXED)
    ########################################################
    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/

    ########################################################
    # VERIFY DEPLOYMENT
    ########################################################
    - name: Verify Deployment
      run: |
        kubectl get pods
        kubectl get svc
        kubectl get deployments

    ########################################################
    # SUCCESS
    ########################################################
    - name: Success Message
      run: echo "DevSecOps Pipeline Completed Successfully"